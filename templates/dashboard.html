<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bistaka Lanches - Pedidos</title>
    <link rel="icon" type="image/png" href="static/uploads/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        .admin-navbar {
            background: #2c3e50; color: white; padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); flex-wrap: wrap; gap: 10px;
            }
        .admin-navbar .brand {
            font-weight: bold; font-size: 1.2rem; display: flex; align-items: center; gap: 10px;
             }
         .admin-navbar .nav-links {
            display: flex; gap: 10px; flex-wrap: wrap;
            }
        .admin-navbar a {
            color: white; text-decoration: none; padding: 8px 15px; 
            border-radius: 5px; background: rgba(255,255,255,0.1); 
             transition: background 0.2s; font-size: 0.95rem; font-family: sans-serif;
            }
         .admin-navbar a:hover { background: rgba(255,255,255,0.25); }
    
        @media print { .admin-navbar { display: none !important; } }

        body { font-family: 'Segoe UI', sans-serif; background: #ffffff; padding: 20px; margin: 0; }
        
        .painel-container {
            max-width: 1000px; margin: auto; background: white; 
            border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            height: 90vh; display: flex; flex-direction: column;
        }

        h1 { margin: 0 0 20px; display: flex; justify-content: space-between; align-items: center; color: #333; }
        .btn-refresh { font-size: 1rem; cursor: pointer; background: #eee; border: none; padding: 10px; border-radius: 5px; }

        /* Lista de Pedidos (Scroll) */
        .lista-pedidos { flex: 1; overflow-y: auto; border: 1px solid #ddd; border-radius: 10px; }
        
        .card-pedido {
            border-bottom: 1px solid #eee; padding: 15px; display: flex; 
            justify-content: space-between; align-items: center;
            transition: background 0.2s;
        }
        .card-pedido:hover { background: #f9f9f9; }
        .card-pedido.novo { background: #e8f5e9; border-left: 5px solid #2ecc71; } /* Destaque verde para novos */

        .info-pedido h3 { margin: 0; font-size: 1.2rem; color: #333; }
        .info-pedido p { margin: 5px 0 0; color: #666; font-size: 0.95rem; }
        .hora-badge { background: #333; color: white; padding: 3px 8px; border-radius: 5px; font-size: 0.8rem; }

        .btn-imprimir {
            background: #333; color: white; border: none; padding: 10px 20px;
            border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1rem;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-imprimir:hover { background: #000; }

        /* --- ADAPTAÇÃO PARA CELULAR (Mobile) --- */
        @media (max-width: 768px) {
            body { padding: 5px; background: #f5f6fa; }
            .painel-container { 
                padding: 15px; 
                height: 98vh; 
                border-radius: 10px;
                box-shadow: none; /* Tira a sombra grossa no celular */
            }
            
            /* Ajusta o título e os botões do topo */
            h1 { flex-direction: column; gap: 15px; font-size: 1.5rem; text-align: center; }
            h1 div { display: flex; width: 100%; justify-content: space-between; gap: 10px; }
            h1 div a, h1 div button { flex: 1; text-align: center; margin: 0; }

            /* Ajusta os cards dos pedidos para não espremer */
            .card-pedido { 
                flex-direction: column; 
                align-items: stretch; /* Estica os itens para preencher a tela */
                gap: 15px; 
            }
            .info-pedido { padding-right: 0 !important; }
            
            /* Coloca os botões de ação lado a lado embaixo do pedido */
            .card-pedido > div:last-child { 
                flex-direction: row !important; 
                gap: 10px; 
                min-width: 100%; 
            }
            .card-pedido button { flex: 1; margin: 0 !important; font-size: 0.9rem; }
        }

        /* --- MÁGICA DA IMPRESSÃO TÉRMICA (80mm) --- */
        #cupom-fiscal { display: none; } /* Esconde na tela normal */

        @media print {
            /* Esconde TUDO da tela do PC */
            body * { visibility: hidden; }
            .painel-container, .btn-imprimir { display: none; }

            /* Mostra SÓ o cupom */
            #cupom-fiscal, #cupom-fiscal * {
                visibility: visible; display: block;
            }
            
            #cupom-fiscal {
                position: absolute; left: 0; top: 0; width: 80mm; /* Largura padrão térmica */
                font-family: 'Courier New', monospace; /* Fonte tipo recibo */
                font-size: 12px; line-height: 1.2; padding: 0; margin: 0;
                color: black;
            }

            /* Formatação do Recibo */
            .recibo-header { text-align: center; border-bottom: 1px dashed black; padding-bottom: 5px; margin-bottom: 5px; }
            .recibo-body { margin-bottom: 10px; border-bottom: 1px dashed black; padding-bottom: 5px; }
            .recibo-item { display: flex; justify-content: space-between; }
            .recibo-total { font-size: 16px; font-weight: bold; text-align: right; margin-top: 5px; }
            .recibo-footer { text-align: center; font-size: 10px; margin-top: 10px; }
        }
    </style>
</head>
<body>
<nav class="admin-navbar">
    <div class="brand">
        <img src="/static/uploads/logo.png" style="height: 35px; width: 35px; border-radius: 50%; object-fit: cover;">
        Painel Bistaka
    </div>
    <div class="nav-links">
        <a href="/admin/dashboard">🍳 Cozinha</a>
            <a href="/admin">🍔 Cardápio</a>
            <a href="/admin/relatorio">📊 Dia</a>
            <a href="/admin/relatorio_mensal">📈 Mês</a>
            <a href="/admin/clientes" style="background: #27ae60;">👥 Clientes</a>
        <a href="/" target="_blank" style="background: transparent; border: 1px solid #bdc3c7;">🌐 Ver Site</a>
    </div>
</nav>

<div class="painel-container">
    <h1>
        <span>🖥️ Pedidos - Cozinha</span>
        <div>
            <a href="/admin/relatorio" style="background:#8e44ad; color:white; padding:10px; text-decoration:none; border-radius:5px; font-size:1rem;">📊 Fechar Caixa</a>
            <button class="btn-refresh" onclick="buscarPedidos()">🔄 Atualizar</button>
        </div>
    </h1>
    
    <div class="lista-pedidos" id="lista">
        <div style="padding: 20px; text-align: center; color: #999;">Carregando pedidos...</div>
    </div>
</div>

<div id="cupom-fiscal"></div>

<script>
    // Configurações
    let ultimoId = 0;

    // Toca um som quando chega pedido novo (opcional)
    const audio = new Audio('https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg');

    async function buscarPedidos() {
        try {
            const response = await fetch('/api/pedidos_hoje');
            const pedidos = await response.json();
            
            const lista = document.getElementById('lista');
            lista.innerHTML = ''; // Limpa e refaz (poderia ser otimizado, mas pra local tá ótimo)

            // Verifica se tem pedido novo para tocar som
            if (pedidos.length > 0 && pedidos[0].id > ultimoId) {
                if (ultimoId !== 0) audio.play(); // Toca só se não for o primeiro load
                ultimoId = pedidos[0].id;
            }

            pedidos.forEach(p => {
              
                const statusAtual = p.status || 'producao';
                
                if (statusAtual === 'finalizado') return;

                let botaoStatusHtml = '';
                let corBorda = '#f39c12';
                let textoStatus = '👨‍🍳 Em Produção';

                if (statusAtual === 'producao') {
                    botaoStatusHtml = `<button onclick="mudarStatus(${p.id}, 'despachado')" style="background:#3498db; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer; font-weight:bold; margin-bottom: 5px; width: 100%;">🛵 Despachar</button>`;
                } else if (statusAtual === 'despachado') {
                    corBorda = '#3498db'; 
                    textoStatus = '🛵 Saiu para Entrega';
                    botaoStatusHtml = `<button onclick="mudarStatus(${p.id}, 'finalizado')" style="background:#2ecc71; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer; font-weight:bold; margin-bottom: 5px; width: 100%;">✅ Finalizar</button>`;
                }

                const itensFormatadosTela = p.itens.replace(/\n/g, '<br>');
                const infoEndereco = (p.bairro === 'Retirada' || !p.endereco) 
                    ? `<p style="color:#e67e22; font-weight:bold;">🏃 Retirada no Balcão</p>` 
                    : `<p><strong>📍 Entrega:</strong> ${p.endereco} (${p.bairro})</p>`;
                    
                lista.innerHTML += `
                    <div class="card-pedido ${p.id === ultimoId ? 'novo' : ''}" style="border-left: 6px solid ${corBorda};">
                        <div class="info-pedido" style="flex: 1; padding-right: 15px;">
                            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 5px;">
                                <h3 style="margin: 0;"><span class="hora-badge">${p.hora}</span> Pedido #${p.id}</h3>
                                <span style="color: ${corBorda}; font-weight:bold; font-size: 0.9rem;">${textoStatus}</span>
                            </div>
                            
                            <p><strong>👤 Cliente:</strong> ${p.nome} <br><small>📞 Tel: ${p.cliente}</small></p>
                            ${infoEndereco}
                            
                            <p style="margin-top: 10px; background: #f1f1f1; padding: 10px; border-radius: 5px; font-size: 0.9rem;">
                                ${itensFormatadosTela}
                            </p>
                            
                            <p style="color: green; font-weight:bold; margin-top: 10px;">Total: R$ ${p.total.toFixed(2)} (${p.pagamento})</p>
                        </div>
                        
                        <div style="display: flex; flex-direction: column; justify-content: center; min-width: 130px;">
                            ${botaoStatusHtml}
                            <button class="btn-imprimir" onclick='imprimirComanda(${JSON.stringify(p)})' style="width: 100%;">
                                🖨️ Imprimir
                            </button>
                        </div>
                    </div>
                `;
            });

        } catch (error) {
            console.error("Erro ao buscar pedidos:", error);
        }
    }

    function imprimirComanda(p) {
        // 1. Preenche o HTML do Cupom Oculto
        const cupom = document.getElementById('cupom-fiscal');
        
      let itensHtml = p.itens ? p.itens.trim().split('\n').map(linha => {
            if(linha) return `<div class="recibo-item" style="margin-bottom: 5px;"><span>${linha}</span></div>`;
            return '';
        }).join('') : '';

        // Formata o endereço para a impressora
        const enderecoPrint = (p.bairro === 'Retirada' || !p.endereco)
            ? `<div style="text-align:center; font-weight:bold; margin: 5px 0; border: 1px solid black; padding: 2px;">RETIRADA NO BALCÃO</div>`
            : `<div><strong>Endereço:</strong> ${p.endereco}<br><strong>Bairro:</strong> ${p.bairro}</div>`;

        cupom.innerHTML = `
            <div class="recibo-header">
                <strong>BISTAKA LANCHES</strong><br>
                --------------------------------<br>
                PEDIDO #${p.id} - ${p.hora}<br>
                --------------------------------
            </div>
            <div class="recibo-body">
                <div><strong>Cliente:</strong> ${p.nome}</div>
                <div><strong>Telefone:</strong> ${p.cliente}</div>
                ${enderecoPrint}
                <br>
                <strong>ITENS:</strong><br>
                ${itensHtml}
            </div>
            <div class="recibo-total">
                TOTAL: R$ ${p.total.toFixed(2)}
            </div>
            <div style="text-align:right; font-size:12px;">
                Pagamento: ${p.pagamento}
            </div>
            <div class="recibo-footer">
                Obrigado pela preferência!<br>
                 www.bistaka.com.br
            <br>
            
            </div>
        `;

        window.print();
    }

    async function mudarStatus(id, novoStatus) {
        if(novoStatus === 'finalizado') {
            const confirmar = confirm("Tem certeza que deseja finalizar? O pedido sairá da tela.");
            if (!confirmar) return;
        }

        try {
            await fetch(`/api/mudar_status/${id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: novoStatus })
            });
            buscarPedidos(); // Recarrega a tela automaticamente!
        } catch (error) {
            console.error("Erro ao mudar status:", error);
            alert("Erro ao atualizar o pedido.");
        }
    }
    // Atualiza a cada 10 segundos
    setInterval(buscarPedidos, 10000);
    
    // Busca na hora que abre
    buscarPedidos();
</script>

</body>
</html>
